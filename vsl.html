    <script>
    (function () {
      const COOKIE_NAME = "rtkclickid-store";
      const PARAM_NAME = "tid";
      const POLL_INTERVAL = 300;
      const POLL_TIMEOUT = 8000;

      function getCookie(name) {
        const row = document.cookie.split('; ').find(r => r.startsWith(name + '='));
        return row ? decodeURIComponent(row.split('=')[1]) : null;
      }

      function loadHopScript() {
        if (window.__hopLoaded) return;
        window.__hopLoaded = true;
        const script = document.createElement("script");
        script.src = "https://scripts.clickbank.net/hop.min.js";
        script.defer = true;
        document.head.appendChild(script);
      }

      function syncClickbankLinks() {
        const currentParams = new URL(window.location.href).searchParams;
        document.querySelectorAll('a[href*="clickbank"]').forEach(link => {
          try {
            const linkUrl = new URL(link.href);
            currentParams.forEach((value, key) => {
              if (!linkUrl.searchParams.has(key)) linkUrl.searchParams.set(key, value);
            });
            link.href = linkUrl.toString();
          } catch(e) {}
        });
      }

      const observer = new MutationObserver(syncClickbankLinks);
      observer.observe(document.documentElement, { childList: true, subtree: true });

      let lastUrl = location.href;
      setInterval(() => {
        if (location.href !== lastUrl) { lastUrl = location.href; syncClickbankLinks(); }
      }, 500);

      syncClickbankLinks();

      const url = new URL(window.location.href);
      if (url.searchParams.has(PARAM_NAME)) { loadHopScript(); return; }

      const start = Date.now();
      const interval = setInterval(() => {
        const tid = getCookie(COOKIE_NAME);
        if (tid) {
          clearInterval(interval);
          url.searchParams.set(PARAM_NAME, tid);
          window.history.replaceState({}, "", url.toString());
          syncClickbankLinks();
          loadHopScript();
          return;
        }
        if (Date.now() - start > POLL_TIMEOUT) { clearInterval(interval); loadHopScript(); }
      }, POLL_INTERVAL);
    })();
    </script>

    <!-- Initiate Checkout REDTRACK -->
    <script>
    document.addEventListener("DOMContentLoaded", () => {
      document.body.addEventListener("click", async (event) => {
        const link = event.target.closest("a");
        if (!link || !(link.href.includes("/click") || link.href.includes("clickbank"))) return;
        event.preventDefault();
        await handlePostbackAndNavigate(link.href);
      });

      async function handlePostbackAndNavigate(href) {
        const urlParams = new URLSearchParams(window.location.search);
        let clickid = urlParams.get("rtkcid") || urlParams.get("tid") || getCookie("rtkclickid-store");
        if (!clickid) { window.location.href = href; return; }
        const postbackUrl = "https://bxpm1.rttrk.com/postback";
        const postbackParams = new URLSearchParams({ clickid, type: "InitiateCheckout" });
        try {
          await new Promise((resolve) => {
            const img = new Image();
            img.onload = img.onerror = resolve;
            img.src = `${postbackUrl}?${postbackParams}`;
            setTimeout(resolve, 3000);
          });
        } catch (error) {} finally { window.location.href = href; }
      }

      function getCookie(name) {
        const row = document.cookie.split('; ').find(r => r.startsWith(name + '='));
        return row ? decodeURIComponent(row.split('=')[1]) : null;
      }
    });
    </script>
